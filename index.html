<!DOCTYPE html><html><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Cavesmines 1Win Predictor</title>
<link rel="stylesheet" href="style.css">
</head><body>
<div id="app">
  <header>
    <div class="balance">$<span id="balance">1000.50</span></div>
    <div class="bet">Bet: $<span id="bet">10.00</span></div>
    <div class="conf"><span id="confidence">87%</span> Confidence</div>
  </header>
  
  <div class="grid" id="grid"></div>
  
  <div class="controls">
    <input type="number" id="betInput" value="10" min="0.01">
    <button onclick="placeBet()">Place Bet</button>
    <button onclick="cashout()">Cash Out</button>
  </div>
  
  <div class="history">
    <h3>History (<span id="histCount">0</span>)</h3>
    <div id="historyList"></div>
  </div>
</div>
<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<script src="script.js"></script>
</body></html>
